# Behavioral smoke tests (constitution Quality Standards, behavioral-test
# tier): install ArDD into throwaway target projects, run state-mutating
# skill flows headlessly, and assert on the file outcomes via
# scripts/smoke-assert.sh.
#
# STANDING STATE — the ANTHROPIC_API_KEY secret is deliberately NOT
# provisioned (decided 2026-07-06, plan-ardd-state-determinism; reaffirmed
# 2026-07-12): every job checks for it, skips fast when absent, and
# carries continue-on-error, so these scenarios currently validate
# structure only, never execute. Provisioning the secret (repo settings →
# Actions secrets) is the single manual step that turns them live;
# promotion to a required check = provision it and remove
# continue-on-error.
#
# MAINTENANCE RULE (constitution Quality Standards): scenarios must be
# kept current with the state-mutating skill paths. When a skill gains or
# changes a mutation path (a new mode, a new file it writes, a new status
# flip), extend or adjust a scenario here in the same change — a skipped
# scenario that has drifted from the skill it exercises is worse than none
# once the key goes live.
name: smoke

on:
  pull_request:
    paths:
      - "skills/**"

jobs:
  skill-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not provisioned — skipping smoke run (expected until the secret is added)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up target fixture
        if: steps.key.outputs.present == 'true'
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          mkdir -p /tmp/smoke-target/.project/artifacts
          cd /tmp/smoke-target
          git init -q -b main
          cat > .project/artifacts/constitution.md <<'EOF'
          ---
          name: constitution
          status: stable
          last_updated: 2026-07-06
          workflow_mode: solo
          ---
          # Smoke Constitution

          ## Core Principles

          ### I. Simplicity

          Keep it minimal.
          EOF
          git add -A && git commit -q -m "fixture init"
          cd "$GITHUB_WORKSPACE"
          ./install.sh /tmp/smoke-target

      - name: Install Claude Code CLI
        if: steps.key.outputs.present == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: "Smoke flow: /ardd-backlog then /ardd-plan"
        if: steps.key.outputs.present == 'true'
        working-directory: /tmp/smoke-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/ardd-backlog add a hello command that prints a greeting" --dangerously-skip-permissions
          slug="$(ls .project/features | head -1 | sed 's/\.md$//')"
          echo "logged feature slug: $slug"
          claude -p "/ardd-plan $slug" --dangerously-skip-permissions

      - name: "Scenario 1 assertions: feature logged, plan drafted"
        if: steps.key.outputs.present == 'true'
        run: |
          slug="$(ls /tmp/smoke-target/.project/features | head -1 | sed 's/\.md$//')"
          plan="$(ls /tmp/smoke-target/.project/plans | grep '^plan-' | head -1 || true)"
          test -n "$plan" || { echo "no plan file produced"; exit 1; }
          ./scripts/smoke-assert.sh /tmp/smoke-target \
            --exists ".project/features/$slug.md" \
            --exists ".project/plans/$plan" \
            --feature "$slug" backlogged
          # Single-writer discipline: the plan run must not have created
          # DEFECTS.md, SYNC.md, or TRACKER.md (owned by ardd-defects/ardd-tracker;
          # SYNC.md is the pre-v1.0.0 legacy name — assert both).
          ./scripts/smoke-assert.sh /tmp/smoke-target \
            --absent ".project/DEFECTS.md" \
            --absent ".project/SYNC.md" \
            --absent ".project/TRACKER.md"

      # Scenario 2 [defect: 970d935b]: the approve->implement mutation path.
      # /ardd-plan --from approves the scenario-1 plan and generates its
      # tasks file (plan-flip, feature-flip planned->tasked); /ardd-implement
      # executes to completion (tasks-flip, task-check, feature-flip
      # implemented).
      - name: "Scenario 2: approve + task the plan, then /ardd-implement"
        if: steps.key.outputs.present == 'true'
        working-directory: /tmp/smoke-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/ardd-plan --from $(ls .project/plans | grep '^plan-' | head -1) — approve it and generate its tasks" --dangerously-skip-permissions
          claude -p "/ardd-implement — work the only actionable tasks file inline to completion" --dangerously-skip-permissions

      - name: "Scenario 2 assertions: approved plan, completed tasks, implemented feature"
        if: steps.key.outputs.present == 'true'
        run: |
          slug="$(ls /tmp/smoke-target/.project/features | head -1 | sed 's/\.md$//')"
          plan="$(ls /tmp/smoke-target/.project/plans | grep '^plan-' | head -1)"
          tasks="$(ls /tmp/smoke-target/.project/tasks | grep '^tasks-' | head -1 || true)"
          test -n "$tasks" || { echo "no tasks file produced"; exit 1; }
          ./scripts/smoke-assert.sh /tmp/smoke-target \
            --plan-status ".project/plans/$plan" approved \
            --tasks-status ".project/tasks/$tasks" completed \
            --feature "$slug" implemented \
            --absent ".project/DEFECTS.md" \
            --absent ".project/SYNC.md" \
            --absent ".project/TRACKER.md"

  # Scenario 3 [defect: 7efff3a5]: reconcile mode. Seed a target whose
  # codebase work is ahead of its in-progress tasks file's checkboxes
  # (T001's deliverable already exists on disk, unchecked), run
  # `/ardd-implement --reconcile`, and assert the checkboxes advanced and
  # every status is still legal (smoke-assert always lints).
  reconcile-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not provisioned — skipping smoke run (expected until the secret is added)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up interrupted-run fixture
        if: steps.key.outputs.present == 'true'
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          mkdir -p /tmp/reconcile-target/.project/artifacts \
                   /tmp/reconcile-target/.project/features \
                   /tmp/reconcile-target/.project/plans \
                   /tmp/reconcile-target/.project/tasks
          cd /tmp/reconcile-target
          git init -q -b main
          cat > .project/artifacts/constitution.md <<'EOF'
          ---
          name: constitution
          status: stable
          last_updated: 2026-07-12
          workflow_mode: solo
          ---
          # Smoke Constitution

          ## Core Principles

          ### I. Simplicity

          Keep it minimal.
          EOF
          cat > .project/features/hello-command.md <<'EOF'
          ---
          slug: hello-command
          status: tasked
          logged: 2026-07-12
          ---
          A hello command that prints a greeting.
          EOF
          cat > .project/plans/plan-hello-command-2026-07-12.md <<'EOF'
          ---
          status: approved
          branch: hello-command
          created: 2026-07-12
          features: [hello-command]
          ---
          # Plan: hello command

          Two tiny shell scripts at the project root.
          EOF
          cat > .project/tasks/tasks-hello-command-cafe.md <<'EOF'
          ---
          plan: plan-hello-command-2026-07-12.md
          generated: 2026-07-12
          status: in-progress
          ---
          # Tasks

          - [ ] T001 Create hello.sh at the project root: a POSIX sh script that prints "hello"
          - [ ] T002 Create bye.sh at the project root: a POSIX sh script that prints "bye"
          EOF
          # Codebase ahead of the checkboxes: T001's deliverable already
          # exists, but its box is unchecked (interrupted run).
          printf '#!/usr/bin/env sh\necho "hello"\n' > hello.sh
          chmod +x hello.sh
          git add -A && git commit -q -m "fixture: interrupted run, T001 done on disk but unchecked"
          cd "$GITHUB_WORKSPACE"
          ./install.sh /tmp/reconcile-target

      - name: Install Claude Code CLI
        if: steps.key.outputs.present == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: "Smoke flow: /ardd-implement --reconcile"
        if: steps.key.outputs.present == 'true'
        working-directory: /tmp/reconcile-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/ardd-implement --reconcile .project/tasks/tasks-hello-command-cafe.md — reconcile and then continue inline to completion" --dangerously-skip-permissions

      - name: "Scenario 3 assertions: checkboxes advanced, statuses legal"
        if: steps.key.outputs.present == 'true'
        run: |
          ./scripts/smoke-assert.sh /tmp/reconcile-target \
            --task-checked ".project/tasks/tasks-hello-command-cafe.md" T001 \
            --exists "hello.sh" \
            --absent ".project/DEFECTS.md" \
            --absent ".project/TRACKER.md"

  # Scenario 4 [defect: 7efff3a5]: /ardd-init, both modes. Greenfield —
  # a scripted design-conversation prompt stands in for the interview;
  # assert the constitution was seeded with valid frontmatter (smoke-assert
  # lints) and STATUS.md exists. Existing-code — a minimal fixture codebase;
  # assert artifacts were reverse-engineered.
  init-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not provisioned — skipping smoke run (expected until the secret is added)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up targets (greenfield + existing-code fixtures)
        if: steps.key.outputs.present == 'true'
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          mkdir -p /tmp/init-greenfield
          cd /tmp/init-greenfield
          git init -q -b main
          git commit -q --allow-empty -m "empty project"
          mkdir -p /tmp/init-existing
          cd /tmp/init-existing
          git init -q -b main
          printf '#!/usr/bin/env sh\n# greet: print a greeting for the given name\necho "hello ${1:-world}"\n' > greet.sh
          chmod +x greet.sh
          printf '# greet\n\nA tiny CLI that prints a greeting.\n' > README.md
          git add -A && git commit -q -m "existing codebase fixture"
          cd "$GITHUB_WORKSPACE"
          ./install.sh /tmp/init-greenfield
          ./install.sh /tmp/init-existing

      - name: Install Claude Code CLI
        if: steps.key.outputs.present == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: "Smoke flow: /ardd-init greenfield (scripted design conversation)"
        if: steps.key.outputs.present == 'true'
        working-directory: /tmp/init-greenfield
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/ardd-init — greenfield project. Design decisions, in lieu of the interview: a tiny CLI named greet that prints a greeting; POSIX sh; no external dependencies; workflow_mode solo; next_step_prompt false. Use these decisions as given — do not ask questions." --dangerously-skip-permissions

      - name: "Scenario 4a assertions: greenfield artifacts seeded"
        if: steps.key.outputs.present == 'true'
        run: |
          ./scripts/smoke-assert.sh /tmp/init-greenfield \
            --exists ".project/artifacts/constitution.md" \
            --exists ".project/STATUS.md" \
            --absent ".project/DEFECTS.md" \
            --absent ".project/TRACKER.md"

      - name: "Smoke flow: /ardd-init existing-code"
        if: steps.key.outputs.present == 'true'
        working-directory: /tmp/init-existing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/ardd-init — existing codebase: reverse-engineer the artifacts from the code as it stands. Pick workflow_mode solo and next_step_prompt false — do not ask questions." --dangerously-skip-permissions

      - name: "Scenario 4b assertions: artifacts reverse-engineered"
        if: steps.key.outputs.present == 'true'
        run: |
          ./scripts/smoke-assert.sh /tmp/init-existing \
            --exists ".project/artifacts/constitution.md" \
            --absent ".project/DEFECTS.md" \
            --absent ".project/TRACKER.md"
