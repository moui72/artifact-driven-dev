name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/lint-docs.sh

  lint-docs-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/test-lint-docs.sh

  lint-templates-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 -c 'import yaml' || pip3 install pyyaml
      - run: ./scripts/lint-templates-yaml.sh

  lint-templates-yaml-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 -c 'import yaml' || pip3 install pyyaml
      - run: ./scripts/test-lint-templates-yaml.sh

  lint-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/test-lint-project.sh

  branch-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-branch-info.sh

  completion-flip-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
