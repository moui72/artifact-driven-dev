name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/lint-docs.sh

  lint-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-lint-project.sh

  branch-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-branch-info.sh
