    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-sync-slug-match.sh

  sync-label-decision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-sync-label-decision.sh

  sync-divergence:
