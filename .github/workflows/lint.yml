name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/lint-docs.sh

  lint-docs-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-lint-docs.sh

  lint-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-lint-project.sh

  branch-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-branch-info.sh

  completion-flip-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-completion-flip-check.sh

  worktree-align:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-worktree-align.sh

  fold-to-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-fold-to-main.sh

  inflight-worktrees:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-inflight-worktrees.sh

  install-worktreeinclude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-install-worktreeinclude.sh

  install-prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-install-prune.sh

  new-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-new.sh

  sibling-tasks-complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-sibling-tasks-complete.sh

  sync-slug-match:
