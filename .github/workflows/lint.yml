name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/lint-docs.sh

  lint-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-lint-project.sh

  branch-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global user.email "ci@example.com" && git config --global user.name "CI"
      - run: ./scripts/test-branch-info.sh

  sibling-tasks-complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-sibling-tasks-complete.sh

  hook-lint-on-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-hook-lint-on-write.sh

  hooks-pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-hooks-pre-commit.sh
